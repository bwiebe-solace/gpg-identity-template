name: Create Signature PR

on:
  issues:
    types: [opened, reopened]

jobs:
  create-pr:
    if: contains(github.event.issue.labels.*.name, 'signature-submission')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write

    steps:
      - name: Extract key from issue body
        id: extract
        env:
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: |
          KEY=$(printf '%s\n' "$ISSUE_BODY" | awk '
            /^-----BEGIN PGP PUBLIC KEY BLOCK-----/ { found=1 }
            found { print }
            /^-----END PGP PUBLIC KEY BLOCK-----/ { exit }
          ')
          if [ -z "$KEY" ]; then
            echo "No PGP key block found in submission." >&2
            exit 1
          fi
          printf '%s\n' "$KEY" > submitted_key.asc

      - name: Comment on missing key block
        if: failure() && steps.extract.outcome == 'failure'
        env:
          GH_TOKEN: ${{ github.token }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          printf '%s\n\n%s\n\n%s\n\n%s\n' \
            "**Submission failed: no PGP key block found.**" \
            "No \`-----BEGIN PGP PUBLIC KEY BLOCK-----\` block was found in your submission." \
            "Please ensure you paste the full armored output of: \`gpg --armor --export XXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXX\`" \
            "If the automated flow continues to fail, you can submit the key file directly by email or open a pull request manually. See [SIGNER_GUIDE.md](../blob/main/SIGNER_GUIDE.md) for details." \
            > err_body.md
          gh issue comment "$ISSUE_NUMBER" --body-file err_body.md

      - name: Validate key fingerprint
        id: validate
        run: |
          EXPECTED="XXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXX"
          gpg --import submitted_key.asc 2>/dev/null
          ACTUAL=$(gpg --with-colons --fingerprint "$EXPECTED" 2>/dev/null | awk -F: '/^fpr/{print $10; exit}')
          if [ "$ACTUAL" != "$EXPECTED" ]; then
            echo "Fingerprint mismatch: expected $EXPECTED, got '$ACTUAL'" >&2
            exit 1
          fi

      - name: Comment on fingerprint mismatch
        if: failure() && steps.validate.outcome == 'failure'
        env:
          GH_TOKEN: ${{ github.token }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          printf '%s\n\n%s\n\n%s\n\n%s\n' \
            "**Submission failed: fingerprint mismatch.**" \
            "The submitted key does not contain the expected fingerprint: \`XXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXX\`" \
            "Common causes: you exported a different key (ensure you run \`gpg --armor --export XXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXX\`), or the key was truncated or corrupted when pasting." \
            "If the automated flow continues to fail, you can submit the key file directly by email or open a pull request manually. See [SIGNER_GUIDE.md](../blob/main/SIGNER_GUIDE.md) for details." \
            > err_body.md
          gh issue comment "$ISSUE_NUMBER" --body-file err_body.md

      - name: Create branch and open PR
        if: success()
        env:
          GH_TOKEN: ${{ github.token }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_USER: ${{ github.event.issue.user.login }}
        run: |
          BRANCH="signature/issue-${ISSUE_NUMBER}"

          # Create branch at current main HEAD
          MAIN_SHA=$(gh api "repos/${GITHUB_REPOSITORY}/git/ref/heads/main" --jq '.object.sha')
          gh api "repos/${GITHUB_REPOSITORY}/git/refs" \
            --method POST \
            --field "ref=refs/heads/${BRANCH}" \
            --field "sha=${MAIN_SHA}"

          # Get current blob SHA of pubkey.asc (required by the update API)
          FILE_SHA=$(gh api "repos/${GITHUB_REPOSITORY}/contents/pubkey.asc" --jq '.sha')

          # Commit via the API — API commits are signed by GitHub automatically
          KEY_B64=$(base64 -w 0 submitted_key.asc)
          gh api "repos/${GITHUB_REPOSITORY}/contents/pubkey.asc" \
            --method PUT \
            --field "message=signature: Add signature contributed via issue #${ISSUE_NUMBER}" \
            --field "content=${KEY_B64}" \
            --field "sha=${FILE_SHA}" \
            --field "branch=${BRANCH}"

          printf '%s\n\n%s\n' \
            "Submitted via issue #${ISSUE_NUMBER} by @${ISSUE_USER}." \
            "Closes #${ISSUE_NUMBER}" > pr_body.md

          PR_URL=$(gh api "repos/${GITHUB_REPOSITORY}/pulls" \
            --method POST \
            --field "title=Signature from @${ISSUE_USER}" \
            --raw-field "body=$(cat pr_body.md)" \
            --field "head=${BRANCH}" \
            --field "base=main" \
            --jq '.html_url')

          printf '%s\n\n%s\n\n%s\n' \
            "Thank you — a pull request has been opened: ${PR_URL}" \
            "The key owner will review the PR manually, which involves importing your signature and verifying it locally before merging. This is not automated — please allow time for review." \
            "This issue will close automatically when the PR is merged. If the PR is closed without merging, your signature was not accepted; a reason will be given in the PR." \
            > comment_body.md

          gh issue comment "$ISSUE_NUMBER" --body-file comment_body.md
